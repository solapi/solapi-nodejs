name: Beta Release

on:
  workflow_run:
    workflows: ["CI"]
    branches: [beta]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write
  statuses: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-please:
    name: Release Please (Beta)
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      pr_head_sha: ${{ steps.pr-sha.outputs.sha }}
    steps:
      - name: Release Please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: beta
          config-file: release-please-config-beta.json
          manifest-file: .release-please-manifest-beta.json

      - name: Get PR head SHA
        id: pr-sha
        if: ${{ !steps.release.outputs.release_created }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          SHA=$(gh pr list --repo "$REPO" --head release-please--branches--beta --state open --json headRefOid --jq '.[0].headRefOid')
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

  test-release-pr:
    name: Test (Beta Release PR)
    needs: release-please
    if: ${{ !needs.release-please.outputs.release_created && needs.release-please.outputs.pr_head_sha != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Set pending status
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.release-please.outputs.pr_head_sha }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/statuses/$SHA" \
            -f state=pending -f context="Test (Beta)" -f description="Running tests..."

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.pr_head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test (unit only)
        run: pnpm test:ci

      - name: Build
        run: pnpm tsup

      - name: Report success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.release-please.outputs.pr_head_sha }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/statuses/$SHA" \
            -f state=success -f context="Test (Beta)" -f description="Tests passed"

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.release-please.outputs.pr_head_sha }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/statuses/$SHA" \
            -f state=failure -f context="Test (Beta)" -f description="Tests failed"

  lint-release-pr:
    name: Lint (Beta Release PR)
    needs: release-please
    if: ${{ !needs.release-please.outputs.release_created && needs.release-please.outputs.pr_head_sha != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Set pending status
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.release-please.outputs.pr_head_sha }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/statuses/$SHA" \
            -f state=pending -f context="Lint (Beta)" -f description="Running lint..."

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.pr_head_sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint:ci

      - name: Report success
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.release-please.outputs.pr_head_sha }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/statuses/$SHA" \
            -f state=success -f context="Lint (Beta)" -f description="Lint passed"

      - name: Report failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ needs.release-please.outputs.pr_head_sha }}
          REPO: ${{ github.repository }}
        run: |
          gh api "repos/$REPO/statuses/$SHA" \
            -f state=failure -f context="Lint (Beta)" -f description="Lint failed"

  publish:
    name: Publish to npm (Beta)
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 18
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm tsup

      - name: Publish with provenance (beta)
        run: npm publish --provenance --access public --tag beta
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
